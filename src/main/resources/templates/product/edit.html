<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa sản phẩm đấu giá</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #fce4ec;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .form-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(244, 143, 177, 0.25);
            border: 1px solid rgba(244, 143, 177, 0.3);
            max-width: 550px;
        }
        .title-form {
            color: #880e4f;
            font-weight: 800;
        }
        .btn-back {
            border: 2px solid #f8bbd0;
            color: #c2185b;
            background-color: white;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-back:hover {
            background-color: #f8bbd0;
            color: #880e4f;
        }
        .form-control, .form-select {
            border: 2px solid #f8bbd0 !important;
            border-radius: 10px !important;
            padding: 10px 15px;
            background-color: #fff5f8;
        }
        .form-control:focus, .form-select:focus {
            background-color: #ffffff;
            border-color: #e91e63 !important;
            box-shadow: 0 0 0 0.25rem rgba(233, 30, 99, 0.15) !important;
        }
        .btn-submit {
            background: linear-gradient(135deg, #ff80ab, #f50057);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px;
            font-weight: 700;
            transition: all 0.3s;
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #f50057, #c51162);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 0, 87, 0.4);
        }
        .error-box {
            background-color: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="container mt-5 form-card p-4 mb-5">

    <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
        <h5 class="title-form m-0">
            <i class="bi bi-pencil-fill text-danger"></i> Chỉnh sửa sản phẩm
        </h5>
        <a th:href="@{/product/list}" class="btn btn-back btn-sm px-3 shadow-sm">
            <i class="bi bi-arrow-left"></i> Quay về
        </a>
    </div>

    <div th:if="${errorMsg}" class="alert error-box p-3 small fw-bold mb-3 shadow-sm" th:text="${errorMsg}"></div>

    <form th:action="@{/product/update}" th:object="${product}" method="post" class="row g-4">

        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{status}">

        <div class="col-12">
            <label class="form-label small fw-bold text-secondary">Tên Sản Phẩm <span class="text-danger">*</span></label>
            <input type="text" th:field="*{name}" class="form-control">
        </div>

        <div class="col-12">
            <label class="form-label small fw-bold text-secondary">Giá bắt đầu <span class="text-danger">*</span></label>
            <input type="number" th:field="*{price}" class="form-control">
        </div>

        <div class="col-12">
            <label class="form-label small fw-bold text-secondary">Loại sản phẩm <span class="text-danger">*</span></label>
            <select th:field="*{productType.id}" class="form-select">
                <option th:each="type : ${productTypes}" th:value="${type.id}" th:text="${type.name}"></option>
            </select>
        </div>

        <div class="col-12 pt-3">
            <button type="submit" class="btn btn-submit w-100 shadow-sm">
                <i class="bi bi-save2-fill me-1"></i> Lưu Lại Thay Đổi
            </button>
        </div>
    </form>
</div>
</body>
</html>
